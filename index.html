<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>k-skill 런처</title>
<style>
:root {
  --p: #6B4FBB; --p2: #8B6FDB; --p3: #f0ecff;
  --bg: #f4f3fb; --card: #fff;
  --txt: #1a1730; --txt2: #6b6880; --txt3: #9895a8;
  --bdr: #e6e3f5; --shadow: 0 2px 12px rgba(107,79,187,.1);
  --ok: #16a34a; --warn: #d97706; --err: #dc2626;
  --ok-bg: #dcfce7; --warn-bg: #fef9c3; --err-bg: #fee2e2;
  --radius: 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--txt);min-height:100vh}

/* ── Header ── */
header{background:linear-gradient(135deg,#4b2f9b,#6b4fbb 50%,#8b6fdb);
  color:#fff;padding:28px 32px 22px;position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(75,47,155,.3)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo{font-size:1.6rem;font-weight:800;letter-spacing:-0.5px;white-space:nowrap}
.logo span{opacity:.7;font-weight:400;font-size:1rem;margin-left:8px}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;border:none;border-radius:10px;
  font-size:.95rem;background:rgba(255,255,255,.18);color:#fff;outline:none;
  backdrop-filter:blur(4px);transition:background .2s}
.search-wrap input::placeholder{color:rgba(255,255,255,.6)}
.search-wrap input:focus{background:rgba(255,255,255,.28)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.7;pointer-events:none}
.header-stats{font-size:.85rem;opacity:.75;white-space:nowrap}

/* ── Category tabs ── */
.cat-bar{background:#fff;border-bottom:1px solid var(--bdr);
  position:sticky;top:85px;z-index:90;overflow-x:auto}
.cat-bar::-webkit-scrollbar{height:3px}
.cat-bar::-webkit-scrollbar-thumb{background:var(--p);border-radius:2px}
.cats{max-width:1400px;margin:0 auto;display:flex;gap:0;padding:0 24px}
.cat-btn{padding:12px 16px;border:none;background:none;cursor:pointer;font-size:.88rem;
  font-weight:500;color:var(--txt2);white-space:nowrap;border-bottom:3px solid transparent;
  transition:all .2s;display:flex;align-items:center;gap:5px}
.cat-btn:hover{color:var(--p);background:var(--p3)}
.cat-btn.active{color:var(--p);border-bottom-color:var(--p);font-weight:700}
.cat-count{background:var(--p3);color:var(--p);border-radius:20px;padding:1px 7px;
  font-size:.75rem;font-weight:700}
.cat-btn.active .cat-count{background:var(--p);color:#fff}

/* ── Main grid ── */
main{max-width:1400px;margin:0 auto;padding:24px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;margin-top:8px}
.section-header h2{font-size:1.05rem;font-weight:700;color:var(--txt)}
.section-header .line{flex:1;height:1px;background:var(--bdr)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:32px}
.no-results{text-align:center;padding:60px 20px;color:var(--txt3);font-size:1.1rem}

/* ── Card ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--bdr);
  box-shadow:var(--shadow);padding:16px 18px;display:flex;flex-direction:column;gap:10px;
  transition:transform .15s,box-shadow .15s;cursor:default;
  border-left:4px solid var(--cat-color,#ccc)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(107,79,187,.15)}
.card-top{display:flex;align-items:flex-start;gap:10px}
.card-icon{font-size:1.5rem;line-height:1;flex-shrink:0;margin-top:1px}
.card-title-wrap{flex:1;min-width:0}
.card-title{font-size:1rem;font-weight:700;color:var(--txt);line-height:1.3}
.card-id{font-size:.72rem;font-family:'Courier New',monospace;color:var(--p2);
  background:var(--p3);padding:1px 6px;border-radius:4px;display:inline-block;margin-top:3px}
.card-desc{font-size:.83rem;color:var(--txt2);line-height:1.55;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px}
.badge{font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge-ok{color:var(--ok);background:var(--ok-bg)}
.badge-warn{color:var(--warn);background:var(--warn-bg)}
.badge-err{color:var(--err);background:var(--err-bg)}
.copy-btn{padding:7px 14px;background:var(--p);color:#fff;border:none;border-radius:8px;
  font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.copy-btn:hover{background:var(--p2);transform:scale(1.05)}
.copy-btn:active{transform:scale(.97)}
.copy-btn.copied{background:var(--ok)}

/* ── Toast ── */
#toast{position:fixed;bottom:28px;right:28px;background:#1a1730;color:#fff;
  padding:12px 20px;border-radius:10px;font-size:.88rem;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.25);transform:translateY(80px);opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}

/* ── Footer ── */
footer{text-align:center;padding:32px;color:var(--txt3);font-size:.8rem;
  border-top:1px solid var(--bdr)}
footer a{color:var(--p);text-decoration:none}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">k-skill 런처 <span>· NomaDamas/k-skill</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="스킬 이름이나 기능으로 검색..." autocomplete="off">

    <div class="header-stats" id="stats"></div>
  </div>

<div id="toast"></div>

   desc:'인터뷰와 트리거 횟수 통계를 합쳐 불필요한 k-skill 삭제 후보 추천',
   prompt:'k-skill-cleaner 스킬로 잘 안 쓰는 스킬을 정리해줘.'},
];

// ── Build UI ──
let activeCat = 'all';
let query = '';

const catColor = (catId) => (CATS.find(c=>c.id===catId)||{}).color || '#888';
const loginBadge = (l) => l==='req'
  ? '<span class="badge badge-err">🔐 로그인 필요</span>'
  : l==='opt'
  ? '<span class="badge badge-warn">🔑 선택적</span>'
  : '<span class="badge badge-ok">✅ 바로 사용</span>';

function filtered(){
  const q = query.toLowerCase();
  return SKILLS.filter(s => {
    const matchCat = activeCat==='all' || s.cat===activeCat;
    const matchQ = !q || s.name.includes(q) || s.id.includes(q) || s.desc.includes(q) || s.prompt.includes(q);
    return matchCat && matchQ;
  });
}

function countByCat(catId){
  return catId==='all'
    ? SKILLS.length
    : SKILLS.filter(s=>s.cat===catId).length;
}

function renderCats(){
  const el = document.getElementById('cats');
  el.innerHTML = CATS.map(c=>`
    <button class="cat-btn ${activeCat===c.id?'active':''}" data-cat="${c.id}">
      ${c.icon} ${c.name}
      <span class="cat-count">${countByCat(c.id)}</span>
    </button>`).join('');
  el.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{ activeCat=btn.dataset.cat; render(); });
  });
}

function renderMain(){
  const main = document.getElementById('main');
  const list = filtered();
  document.getElementById('stats').textContent = `${list.length} / ${SKILLS.length}개 표시`;

  if(!list.length){
    main.innerHTML='<div class="no-results">🔍 검색 결과가 없습니다.</div>';
    return;
  }

  // group by cat (all mode groups; otherwise single section)
  const groups = activeCat !== 'all'
    ? [{cat: CATS.find(c=>c.id===activeCat)||{name:'',icon:'',color:'#888'}, skills: list}]
    : CATS.filter(c=>c.id!=='all').map(c=>({
        cat:c,
        skills: list.filter(s=>s.cat===c.id)
      })).filter(g=>g.skills.length);

  main.innerHTML = groups.map(g=>`
    <div>
      <div class="section-header">
        <h2>${g.cat.icon} ${g.cat.name}</h2>
        <div class="line"></div>
        <span style="color:var(--txt3);font-size:.8rem">${g.skills.length}개</span>
      </div>
      <div class="grid">
        ${g.skills.map(s=>`
          <div class="card" style="--cat-color:${catColor(s.cat)}" data-id="${s.id}">
            <div class="card-top">
              <div class="card-icon">${g.cat.icon}</div>
              <div class="card-title-wrap">
                <div class="card-title">${s.name}</div>
                <code class="card-id">${s.id}</code>
              </div>
            </div>
            <div class="card-desc">${s.desc}</div>
            <div class="card-footer">
              ${loginBadge(s.login)}
              <button class="copy-btn" data-prompt="${s.prompt.replace(/"/g,'&quot;')}" data-name="${s.name}">
                📋 복사
              </button>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  main.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const prompt = btn.getAttribute('data-prompt');
      const name   = btn.getAttribute('data-name');
      navigator.clipboard.writeText(prompt).then(()=>{
        btn.textContent = '✅ 복사됨!';
        btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='📋 복사'; btn.classList.remove('copied'); }, 1500);
        showToast(`"${name}" 프롬프트 복사됨`);
      }).catch(()=>{
        // fallback
        const ta = document.createElement('textarea');
        ta.value = prompt; ta.style.position='fixed'; ta.style.top='-9999px';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(`"${name}" 복사됨 (fallback)`);
      });
    });
  });
}

function render(){ renderCats(); renderMain(); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = '✅ ' + msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// search
document.getElementById('search').addEventListener('input', e=>{
  query = e.target.value;
  if(query) activeCat='all';
  render();
});

// keyboard shortcut /
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement.tagName!=='INPUT'){
    e.preventDefault(); document.getElementById('search').focus();
  }
});

render();
</script>
</body>
</html>
